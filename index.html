<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Login - Sistema de Atividades</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="logo">Sistema de Atividades</div>
    <p class="subtitle">Escaneie seu crachá para entrar</p>

    <!-- Etapa 1: Identificacao -->
    <div id="etapa-codigo">
      <div class="scan-area">
        <div id="reader"></div>
      </div>

      <button id="btn-scan" class="btn btn-primary btn-lg" onclick="iniciarScan()">
        Escanear Crachá
      </button>

      <div class="input-group mt-16">
        <input type="text" id="codigo-manual" class="input-text" placeholder="Código do crachá"
          maxlength="10" autocomplete="off">
        <button class="btn btn-primary" onclick="verificarCracha()" style="width:auto;padding:12px 20px;">
          Próximo
        </button>
      </div>
    </div>

    <!-- Etapa 2: Senha (apenas quando necessario) -->
    <div id="etapa-senha" class="hidden" style="width:100%;max-width:300px;">
      <div class="card text-center mb-12">
        <div style="font-size:0.85rem;color:#666;">Bem-vindo,</div>
        <div id="func-nome-exibido" style="font-size:1.2rem;font-weight:700;color:#1a73e8;"></div>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="input-senha" class="input-text" placeholder="Digite sua senha"
          autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-lg" onclick="fazerLogin()">
        Entrar
      </button>

      <button class="btn btn-outline mt-8" onclick="voltarCodigo()">
        Voltar
      </button>
    </div>

    <div id="login-msg" class="login-msg"></div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Verificando...</p>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/scanner.js"></script>
  <script>
    if (Auth.estaLogado()) {
      const func = Auth.obterSessao();
      window.location.href = func.perfil === 'gestor' ? 'gestor.html' : 'painel.html';
    }

    let scanAtivo = false;
    let codigoSelecionado = '';

    async function iniciarScan() {
      if (scanAtivo) {
        await Scanner.parar();
        scanAtivo = false;
        document.getElementById('btn-scan').textContent = 'Escanear Crachá';
        return;
      }

      mostrarMsg('Posicione o QRcode na câmera...', 'info');

      const sucesso = await Scanner.iniciar('reader', async (codigo) => {
        scanAtivo = false;
        document.getElementById('btn-scan').textContent = 'Escanear Crachá';
        await verificarCrachaCodigo(codigo.trim().toUpperCase());
      });

      if (sucesso) {
        scanAtivo = true;
        document.getElementById('btn-scan').textContent = 'Parar Câmera';
      } else {
        mostrarMsg('Não foi possível acessar a câmera. Use o campo manual.', 'error');
      }
    }

    // Chamado pelo botao "Proximo" no campo manual
    async function verificarCracha() {
      const codigo = document.getElementById('codigo-manual').value.trim();
      if (!codigo) {
        mostrarMsg('Digite o código do crachá.', 'warning');
        return;
      }
      await verificarCrachaCodigo(codigo.toUpperCase());
    }

    // Verifica se o cracha existe e se requer senha
    async function verificarCrachaCodigo(codigo) {
      mostrarMsg('', '');
      document.getElementById('loading').classList.add('visivel');

      const resultado = await API.get({ acao: 'verificar_cracha', codigo });

      document.getElementById('loading').classList.remove('visivel');

      if (!resultado.sucesso) {
        mostrarMsg(resultado.mensagem, 'error');
        return;
      }

      codigoSelecionado = codigo;

      if (resultado.dados.requer_senha) {
        // Exibir etapa de senha
        document.getElementById('func-nome-exibido').textContent = resultado.dados.nome;
        document.getElementById('etapa-codigo').classList.add('hidden');
        document.getElementById('etapa-senha').classList.remove('hidden');
        document.getElementById('input-senha').value = '';
        document.getElementById('input-senha').focus();
      } else {
        // Login direto sem senha
        await fazerLoginDireto();
      }
    }

    // Login sem senha (funcionarios sem senha cadastrada)
    async function fazerLoginDireto() {
      document.getElementById('loading').classList.add('visivel');

      const resultado = await Auth.login(codigoSelecionado, '');

      document.getElementById('loading').classList.remove('visivel');

      if (!resultado.sucesso) {
        mostrarMsg(resultado.mensagem, 'error');
      }
    }

    // Login com senha
    async function fazerLogin() {
      const senha = document.getElementById('input-senha').value;
      if (!senha) {
        mostrarMsg('Digite sua senha.', 'warning');
        return;
      }

      mostrarMsg('', '');
      document.getElementById('loading').classList.add('visivel');

      const resultado = await Auth.login(codigoSelecionado, senha);

      document.getElementById('loading').classList.remove('visivel');

      if (!resultado.sucesso) {
        mostrarMsg(resultado.mensagem, 'error');
      }
    }

    function voltarCodigo() {
      codigoSelecionado = '';
      document.getElementById('etapa-senha').classList.add('hidden');
      document.getElementById('etapa-codigo').classList.remove('hidden');
      mostrarMsg('', '');
    }

    function mostrarMsg(texto, tipo) {
      const el = document.getElementById('login-msg');
      el.textContent = texto;
      el.className = 'login-msg';
      if (tipo) el.classList.add(`msg-${tipo}`);
    }

    document.getElementById('codigo-manual').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verificarCracha();
    });

    document.getElementById('input-senha').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') fazerLogin();
    });
  </script>
</body>
</html>
