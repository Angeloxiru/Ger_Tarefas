<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Login - Sistema de Atividades</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="logo">Sistema de Atividades</div>
    <p class="subtitle">Escaneie seu cracha para entrar</p>

    <!-- Etapa 1: Identificacao -->
    <div id="etapa-codigo">
      <div class="scan-area">
        <div id="reader"></div>
      </div>

      <button id="btn-scan" class="btn btn-primary btn-lg" onclick="iniciarScan()">
        Escanear Cracha
      </button>

      <div class="input-group mt-16">
        <input type="text" id="codigo-manual" class="input-text" placeholder="Codigo do cracha"
          maxlength="10" autocomplete="off">
        <button class="btn btn-primary" onclick="avancarParaSenha()" style="width:auto;padding:12px 20px;">
          Proximo
        </button>
      </div>
    </div>

    <!-- Etapa 2: Senha -->
    <div id="etapa-senha" class="hidden" style="width:100%;max-width:300px;">
      <div class="card text-center mb-12">
        <div style="font-size:0.85rem;color:#666;">Cracha:</div>
        <div id="codigo-exibido" style="font-size:1.3rem;font-weight:700;color:#1a73e8;"></div>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="input-senha" class="input-text" placeholder="Digite sua senha"
          autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-lg" onclick="fazerLogin()">
        Entrar
      </button>

      <button class="btn btn-outline mt-8" onclick="voltarCodigo()">
        Voltar
      </button>
    </div>

    <div id="login-msg" class="login-msg"></div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Verificando...</p>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/scanner.js"></script>
  <script>
    if (Auth.estaLogado()) {
      const func = Auth.obterSessao();
      if (func.perfil === 'gestor') {
        window.location.href = 'gestor.html';
      } else {
        window.location.href = 'painel.html';
      }
    }

    let scanAtivo = false;
    let codigoSelecionado = '';

    async function iniciarScan() {
      if (scanAtivo) {
        await Scanner.parar();
        scanAtivo = false;
        document.getElementById('btn-scan').textContent = 'Escanear Cracha';
        return;
      }

      mostrarMsg('Posicione o QRcode na camera...', 'info');

      const sucesso = await Scanner.iniciar('reader', async (codigo) => {
        scanAtivo = false;
        document.getElementById('btn-scan').textContent = 'Escanear Cracha';
        mostrarEtapaSenha(codigo);
      });

      if (sucesso) {
        scanAtivo = true;
        document.getElementById('btn-scan').textContent = 'Parar Camera';
      } else {
        mostrarMsg('Nao foi possivel acessar a camera. Use o campo manual.', 'error');
      }
    }

    function avancarParaSenha() {
      const codigo = document.getElementById('codigo-manual').value.trim();
      if (!codigo) {
        mostrarMsg('Digite o codigo do cracha.', 'warning');
        return;
      }
      mostrarEtapaSenha(codigo);
    }

    function mostrarEtapaSenha(codigo) {
      codigoSelecionado = codigo.toUpperCase();
      document.getElementById('codigo-exibido').textContent = codigoSelecionado;
      document.getElementById('etapa-codigo').classList.add('hidden');
      document.getElementById('etapa-senha').classList.remove('hidden');
      document.getElementById('input-senha').value = '';
      document.getElementById('input-senha').focus();
      mostrarMsg('', '');
    }

    function voltarCodigo() {
      codigoSelecionado = '';
      document.getElementById('etapa-senha').classList.add('hidden');
      document.getElementById('etapa-codigo').classList.remove('hidden');
      mostrarMsg('', '');
    }

    async function fazerLogin() {
      const senha = document.getElementById('input-senha').value;
      if (!senha) {
        mostrarMsg('Digite sua senha.', 'warning');
        return;
      }

      mostrarMsg('', '');
      document.getElementById('loading').classList.add('visivel');

      const resultado = await Auth.login(codigoSelecionado, senha);

      document.getElementById('loading').classList.remove('visivel');

      if (!resultado.sucesso) {
        mostrarMsg(resultado.mensagem, 'error');
      }
    }

    function mostrarMsg(texto, tipo) {
      const el = document.getElementById('login-msg');
      el.textContent = texto;
      el.className = 'login-msg';
      if (tipo) {
        el.classList.add(`msg-${tipo}`);
      }
    }

    document.getElementById('codigo-manual').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') avancarParaSenha();
    });

    document.getElementById('input-senha').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') fazerLogin();
    });
  </script>
</body>
</html>
